<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" type="image/png" href="./favicon.png" />
  <title>K-EDGE | 운영자 페이지</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b1020">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body data-page="admin">
  <div class="bg-grid"></div>

  <header class="topbar">
    <a class="brand" href="./index.html"><span class="kmark">K</span><b>K-EDGE</b></a>
    <nav>
      <a href="./index.html" data-nav="home">홈</a>
      <a href="./payment.html" data-nav="payment">등록</a>
      <a href="./mypage.html" data-nav="mypage">내정보</a>
      <a href="./admin.html" data-nav="admin">운영자</a>
    </nav>
    <div class="top-actions" id="topAuthArea">
      <a class="login" href="./index.html">홈으로</a>
    </div>
  </header>

  <main>
    <section class="page-hero admin-hero">
      <p class="exchange-pill">ADMIN</p>
      <h1>K-EDGE 운영자 페이지</h1>
      <p>Supabase 신청 DB 기준으로 승인 대기 / 승인 완료 / AUTO 회원을 관리합니다.</p>
    </section>

    <section id="adminLoginBox" class="admin-login-box">
      <div class="auth-box center-card">
        <p class="exchange-pill">ADMIN LOGIN</p>
        <h1>운영자 인증</h1>
        <p class="auth-sub">관리자 코드 입력 후 접속합니다.</p>
        <input id="adminPin" type="password" placeholder="관리자 코드 입력">
        <button class="auth-main-btn" onclick="adminLogin()">운영자 로그인</button>
        <p id="adminLoginMsg" class="auth-msg"></p>
      </div>
    </section>

    <section id="adminApp" class="admin-app" style="display:none;">
      <div class="admin-top-actions">
        <button onclick="loadAdminDashboard()">새로고침</button>
        <button onclick="exportAdminData()">백업 다운로드</button>
        <button class="ghost-admin" onclick="adminLogout()">운영자 로그아웃</button>
      </div>

      <div id="adminStats" class="admin-stats"></div>

      <section class="admin-panel">
        <div class="admin-panel-head">
          <div>
            <h2>가입 신청 대기 / 승인 관리</h2>
            <p>Supabase kedge_requests 테이블 기준입니다.</p>
          </div>
          <div class="admin-filters">
            <select id="adminStatusFilter">
              <option value="ALL">전체</option>
              <option value="PENDING">승인대기</option>
              <option value="APPROVED">승인완료</option>
              <option value="REJECTED">거절</option>
              <option value="AUTO">AUTO</option>
            </select>
            <input id="adminSearch" placeholder="이메일 / 텔레그램 / TxID 검색">
          </div>
        </div>
        <div id="adminRequestList" class="admin-list"><div class="admin-empty">DB 불러오는 중...</div></div>
      </section>

      <section class="admin-panel">
        <div class="admin-panel-head">
          <div>
            <h2>회원 관리</h2>
            <p>승인 완료된 회원 목록입니다.</p>
          </div>
          <div class="admin-filters">
            <input id="adminUserSearch" placeholder="회원 검색">
          </div>
        </div>
        <div id="adminUserList" class="admin-user-list"><div class="admin-empty">회원 데이터 불러오는 중...</div></div>
      </section>
    </section>
  </main>

  <footer>
    <b>K-EDGE TEAM</b>
    <p>본 페이지는 운영자 전용입니다.</p>
  </footer>

<script>
const SUPABASE_URL = "https://qakhbihueonefzifrmct.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_XboBFueAITcieSL75B2S5g_qlm4XmOm";
const ADMIN_PIN = "0517";
const ADMIN_SESSION = "kedge_admin_logged_in";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let requestCache = [];

function qs(id){ return document.getElementById(id); }
function val(id){ return (qs(id)?.value || "").trim(); }

function adminLogin(){
  const pin = val("adminPin");
  if(pin !== ADMIN_PIN){
    qs("adminLoginMsg").textContent = "❌ 관리자 코드가 틀렸습니다.";
    return;
  }
  sessionStorage.setItem(ADMIN_SESSION, "Y");
  renderAdminPage();
}

function adminLogout(){
  sessionStorage.removeItem(ADMIN_SESSION);
  renderAdminPage();
}

function isAdminLoggedIn(){
  return sessionStorage.getItem(ADMIN_SESSION) === "Y";
}

function productLabel(p){
  return ({AUTO:"K-EDGE AUTO 🚀"})[p] || p || "-";
}

function statusLabel(s){
  return ({PENDING:"승인대기",APPROVED:"승인완료",REJECTED:"거절"})[s] || s || "-";
}

function mask(v){
  const s = String(v || "");
  if(!s) return "미등록";
  if(s.length <= 8) return "••••";
  return s.slice(0,4) + "••••" + s.slice(-4);
}

function dateText(v){
  if(!v) return "-";
  try{ return new Date(v).toLocaleString("ko-KR"); }catch(e){ return v; }
}

function apiSummary(apiObj){
  const labels = {upbit:"업비트", bithumb:"빗썸", mexc:"MEXC", gate:"Gate.io", bitget:"Bitget", bingx:"BingX"};
  let obj = apiObj || {};
  if(typeof obj === "string"){
    try{ obj = JSON.parse(obj); }catch(e){ obj = {}; }
  }

  // K-EDGE API 저장 키 통일: api_key / secret_key
  // 기존 신청 데이터 호환을 위해 api_secret도 표시만 지원합니다.
  const rows = Object.entries(obj)
    .filter(([_, v]) => v && v.enabled)
    .map(([k, v]) => {
      const key = v.api_key || v.apiKey || "";
      const secret = v.secret_key || v.api_secret || v.secretKey || "";
      return `${labels[k] || k}: ${mask(key)} / ${mask(secret)}`;
    });
  return rows.length ? rows.join("<br>") : "미등록";
}

async function fetchRequests(){
  const { data, error } = await db.from("kedge_requests").select("*").order("created_at", { ascending:false });
  if(error){
    console.error(error);
    qs("adminRequestList").innerHTML = `<div class="admin-empty">DB 로딩 실패: ${error.message}</div>`;
    return [];
  }
  return data || [];
}

async function loadAdminDashboard(){
  requestCache = await fetchRequests();
  renderAdminStats();
  renderAdminRequests();
  renderAdminUsers();
}

function renderAdminStats(){
  const rows = requestCache;
  const pending = rows.filter(x=>x.status==="PENDING").length;
  const approved = rows.filter(x=>x.status==="APPROVED").length;
  const rejected = rows.filter(x=>x.status==="REJECTED").length;
  const vip = rows.filter(x=>x.status==="APPROVED" && x.product==="VIP").length;
  const semi = rows.filter(x=>x.status==="APPROVED" && x.product==="SEMI").length;
  const auto = rows.filter(x=>x.status==="APPROVED" && x.product==="AUTO").length;
  qs("adminStats").innerHTML = `
    <article><b>${pending}</b><span>승인 대기</span></article>
    <article><b>${approved}</b><span>승인 완료</span></article>
    <article><b>${rejected}</b><span>거절</span></article>
    <article><b>${vip}</b><span>AUTO</span></article>
  `;
}

function renderAdminRequests(){
  const wrap = qs("adminRequestList");
  const status = val("adminStatusFilter") || "ALL";
  const keyword = val("adminSearch").toLowerCase();
  let rows = requestCache.slice();

  if(status !== "ALL") rows = rows.filter(x => x.status === status || x.product === status);
  if(keyword) rows = rows.filter(x => JSON.stringify(x).toLowerCase().includes(keyword));

  if(!rows.length){
    wrap.innerHTML = `<div class="admin-empty">신청 내역이 없습니다.</div>`;
    return;
  }

  wrap.innerHTML = rows.map(req => {
    const statusClass = String(req.status || "PENDING").toLowerCase();
    return `
      <article class="admin-request-card status-${statusClass}">
        <div class="admin-card-top">
          <div>
            <b>${productLabel(req.product)}</b>
            <p>${req.email || "-"} · ${req.telegram || "미등록"}</p>
          </div>
          <span class="admin-status ${statusClass}">${statusLabel(req.status)}</span>
        </div>

        <div class="admin-detail-grid">
          <p><small>ID</small><strong>${req.id}</strong></p>
          <p><small>신청시간</small><strong>${dateText(req.created_at)}</strong></p>
          <p><small>결제방식</small><strong>${req.pay_type || "-"}</strong></p>
          <p><small>입금자명</small><strong>${req.pay_name || "-"}</strong></p>
          <p><small>TxID/메모</small><strong>${req.memo || "-"}</strong></p>
          <p><small>알림봇</small><strong>@Kedge0203bot 공용봇</strong></p>
          <p><small>CHAT ID</small><strong>${req.tg_chat_id || "미등록"}</strong></p>
          <p><small>국내 API</small><strong>${apiSummary(req.domestic_apis)}</strong></p>
          <p><small>해외 API</small><strong>${apiSummary(req.foreign_apis)}</strong></p>
          <p><small>승인일</small><strong>${dateText(req.approved_at)}</strong></p>
        </div>

        <textarea id="adminNote-${req.id}" class="admin-note" placeholder="관리자 메모">${req.admin_note || ""}</textarea>

        <div class="admin-actions">
          <button class="ok" onclick="approveRequest('${req.id}')">승인</button>
          <button class="danger" onclick="rejectRequest('${req.id}')">거절</button>
          <button onclick="copyText('${req.email || ""}')">이메일 복사</button>
        </div>
      </article>
    `;
  }).join("");
}

function renderAdminUsers(){
  const wrap = qs("adminUserList");
  const keyword = val("adminUserSearch").toLowerCase();
  let rows = requestCache.filter(x => x.status === "APPROVED");
  if(keyword) rows = rows.filter(x => JSON.stringify(x).toLowerCase().includes(keyword));

  if(!rows.length){
    wrap.innerHTML = `<div class="admin-empty">회원 정보가 없습니다.</div>`;
    return;
  }

  wrap.innerHTML = rows.map(u => `
    <article class="admin-user-row">
      <div>
        <b>${u.email || "-"}</b>
        <p>${u.telegram || "미등록"} · ${productLabel(u.product)} · 승인일 ${dateText(u.approved_at)}</p>
      </div>
      <button onclick="copyText('${u.email || ""}')">이메일 복사</button>
    </article>
  `).join("");
}

async function approveRequest(id){
  const note = val("adminNote-" + id);
  const { error } = await db.from("kedge_requests").update({
    status:"APPROVED",
    approved_at:new Date().toISOString(),
    rejected_at:null,
    admin_note:note
  }).eq("id", id);

  if(error){
    console.error(error);
    alert("승인 실패: " + error.message);
    return;
  }
  alert("승인 완료");
  await loadAdminDashboard();
}

async function rejectRequest(id){
  const note = val("adminNote-" + id);
  const { error } = await db.from("kedge_requests").update({
    status:"REJECTED",
    rejected_at:new Date().toISOString(),
    admin_note:note
  }).eq("id", id);

  if(error){
    console.error(error);
    alert("거절 실패: " + error.message);
    return;
  }
  alert("거절 완료");
  await loadAdminDashboard();
}

function copyText(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text || "").then(()=>alert("복사 완료"));
  }else{
    prompt("복사하세요", text || "");
  }
}

function exportAdminData(){
  const blob = new Blob([JSON.stringify(requestCache,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "kedge_requests_backup.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function renderAdminPage(){
  const loginBox = qs("adminLoginBox");
  const app = qs("adminApp");

  if(!isAdminLoggedIn()){
    loginBox.style.display = "block";
    app.style.display = "none";
    return;
  }

  loginBox.style.display = "none";
  app.style.display = "block";
  await loadAdminDashboard();
}

window.addEventListener("DOMContentLoaded", ()=>{
  qs("adminStatusFilter")?.addEventListener("change", renderAdminRequests);
  qs("adminSearch")?.addEventListener("input", renderAdminRequests);
  qs("adminUserSearch")?.addEventListener("input", renderAdminUsers);
  renderAdminPage();
});
</script>
</body>
</html>
