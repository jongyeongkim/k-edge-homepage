<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <title>K-EDGE | 문의센터</title>
</head>
<body data-page="support">
  <div class="bg-grid"></div>
  <header class="topbar">
    <a class="brand" href="./index.html"><span class="kmark">K</span><b>K-EDGE</b></a>
    <nav>
      <a href="./index.html" data-nav="home">홈</a>
      <a href="./pricing.html" data-nav="pricing">요금제</a>
      <a href="./guide.html" data-nav="guide">가이드</a>
      <a href="./payment.html" data-nav="payment">등록</a>
      <a href="./support.html" data-nav="support">문의</a>
      <a href="./mypage.html" data-nav="mypage">내정보</a>
    </nav>
    <div class="top-actions" id="topAuthArea">
      <a class="login" href="./login.html">로그인</a>
      <a class="join" href="./login.html">회원가입</a>
    </div>
  </header>
  <main>
    <section class="page-hero">
      <p class="exchange-pill">SUPPORT</p>
      <h1>문의센터</h1>
      <p>VIP, 반자동, 자동매매, 결제, 오류 문의를 남길 수 있습니다.</p>
    </section>

    <section class="section payment">
      <div class="register-grid single-wide">
        <article class="register-card">
          <h3>문의 등록</h3>
          <select id="ticketCategory">
            <option value="VIP">VIP 문의</option>
            <option value="SEMI">VIP + 반자동 문의</option>
            <option value="AUTO">VIP + 자동 문의</option>
            <option value="PAYMENT">결제 확인</option>
            <option value="ERROR">오류 / 접속 문제</option>
            <option value="ETC">기타 문의</option>
          </select>
          <input id="ticketTelegram" placeholder="텔레그램 ID 예: @listing0517">
          <textarea id="ticketMessage" placeholder="문의 내용을 입력하세요"></textarea>
          <button type="button" onclick="submitSupportTicket()">문의 등록하기</button>
          <p id="ticketMsg" class="form-msg"></p>

          <div class="admin-contact">
            <b>빠른 관리자 문의</b>
            <p>텔레그램: @listing0517</p>
            <a class="btn ghost full" href="https://t.me/listing0517" target="_blank">관리자 텔레그램 문의</a>
          </div>
        </article>
      </div>
    </section>
  </main>
  <footer><b>K-EDGE</b><p>본 서비스는 정보 제공 목적이며, 투자 판단과 책임은 이용자 본인에게 있습니다.</p></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./script.js"></script>
</body>
</html>
