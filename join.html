  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="K-EDGE">

<body data-page="join">
  <div class="bg-grid"></div>
  <header class="topbar">
    <a class="brand" href="./index.html"><span class="kmark">K</span><b>K-EDGE</b></a>
    <nav>
      <a href="./index.html" data-nav="home">홈</a>

      <a href="./payment.html" data-nav="payment">등록</a>
      <a href="./support.html" data-nav="support">문의</a>
      <a href="./mypage.html" data-nav="mypage">내정보</a>
    </nav>
    <div class="top-actions" id="topAuthArea">
      <a class="login" href="./login.html">로그인</a>
      <a class="join" href="./join.html">회원가입</a>
    </div>
  </header>
  <main>
    <section class="auth-shell">
      <div class="auth-box auth-box-single">
        <p class="exchange-pill">JOIN</p>
        <h1>K-EDGE 회원가입</h1>
        <p class="auth-sub">서비스 이용을 위한 계정을 생성하세요.</p>

        <label>이메일</label>
        <input id="signupEmail" type="email" placeholder="example@email.com" autocomplete="email">

        <label>비밀번호</label>
        <div class="pw-wrap">
          <input id="signupPassword" type="password" placeholder="비밀번호 6자리 이상" autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePassword('signupPassword', this)">👁</button>
        </div>

        <label>비밀번호 확인</label>
        <div class="pw-wrap">
          <input id="signupPasswordConfirm" type="password" placeholder="비밀번호 다시 입력" autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePassword('signupPasswordConfirm', this)">👁</button>
        </div>

        <label>텔레그램 ID</label>
        <input id="signupTelegram" placeholder="@kedge_user">

        <label>가입 상품</label>
        <select id="signupPlan">
          <option value="FREE">FREE</option>
          <option value="VIP">VIP</option>
          <option value="SEMI">VIP Lite (반자동)</option>
          <option value="AUTO">VIP Pro (자동)</option>
        </select>

        <div class="plan-extra" data-plan-field="bot">
          <label>텔레그램 BOT TOKEN</label>
          <input id="signupBotToken" placeholder="반자동/자동 연동용 봇 토큰">

          <label>텔레그램 CHAT ID</label>
          <input id="signupChatId" placeholder="예: -1001234567890">
        </div>

        <div class="plan-extra" data-plan-field="auto">
          <label>거래소</label>
          <select id="signupExchange">
            <option value="MEXC">MEXC</option>
            <option value="BITGET">Bitget</option>
            <option value="BINGX">BingX</option>
            <option value="BYBIT">Bybit</option>
          </select>

          <label>API KEY</label>
          <input id="signupApiKey" placeholder="자동매매 연동용 API KEY">

          <label>SECRET KEY</label>
          <input id="signupApiSecret" placeholder="자동매매 연동용 SECRET KEY">
        </div>

        <button class="auth-main-btn" onclick="signupUser()">회원가입</button>
        <p class="auth-msg" id="signupMsg"></p>

        <div class="auth-links only-center">
          <a href="./login.html">이미 회원이신가요? 로그인</a>
        </div>
      </div>
    </section>
  </main>
  <footer>
  <b>K-EDGE TEAM</b>
  <p>Telegram: <a href="https://t.me/listing0517" target="_blank">@listing0517</a></p>

  <p class="footer-note">실시간 데이터는 시장 상황에 따라 변동될 수 있으며 참고용 정보입니다.</p>

</footer>

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {

    });
  });
}
</script>
